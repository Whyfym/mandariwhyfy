<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whyfy打字 — Latihan Mengetik Hanzi HSK 1-5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE6D4;
    --paper-deep:#E2D9C2;
    --ink:#211D18;
    --ink-soft:#4A443C;
    --seal:#AE1F2C;
    --seal-deep:#8C1721;
    --jade:#3C6E52;
    --brass:#A9822A;
    --line: rgba(33,29,24,.28);
    --line-soft: rgba(33,29,24,.14);
    --radius: 4px;
    --shadow: 0 1px 0 rgba(33,29,24,.06), 0 8px 24px rgba(33,29,24,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 34px 34px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:0 24px 80px;}
  header.site{
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 0 18px;border-bottom:2px solid var(--ink);
    max-width:980px;margin:0 auto;padding-left:24px;padding-right:24px;
    flex-wrap:wrap;gap:10px;
  }
  .logo{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
  .logo .mark{
    font-family:'Noto Serif SC',serif;font-weight:900;font-size:1.9rem;
    color:var(--seal); letter-spacing:1px;
  }
  .logo .name{font-family:'Fraunces',serif;font-weight:600;font-size:1.35rem;letter-spacing:.2px;}
  .logo .name em{font-style:italic;color:var(--seal);}
  .header-right{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  nav.top{display:flex;gap:18px;font-family:'JetBrains Mono',monospace;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;}
  nav.top button{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);
    padding:6px 2px;border-bottom:2px solid transparent;font-family:inherit;font-size:inherit;
    letter-spacing:inherit;
  }
  nav.top button.active, nav.top button:hover{color:var(--ink);border-bottom-color:var(--seal);}
  .student-pill{
    font-family:'JetBrains Mono',monospace;font-size:.72rem;border:1.5px solid var(--ink);
    background:var(--paper-deep);padding:5px 12px;display:flex;align-items:center;gap:8px;
  }
  .student-pill button{background:none;border:none;color:var(--seal);cursor:pointer;font-family:inherit;font-size:inherit;text-decoration:underline;padding:0;}

  /* HOME */
  .hero{padding:56px 0 34px;}
  .hero .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--jade);margin-bottom:14px;display:block;
  }
  .hero h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.1rem,5vw,3.4rem);
    line-height:1.06;margin:0 0 18px;max-width:780px;
  }
  .hero h1 .cn{font-family:'Noto Serif SC',serif;font-weight:900;color:var(--seal);}
  .hero p.lede{font-size:1.05rem;line-height:1.65;color:var(--ink-soft);max-width:560px;margin:0 0 28px;}
  .hero-panel{
    border:2px solid var(--ink);background:var(--paper-deep);
    padding:22px 24px;display:flex;gap:22px;align-items:center;flex-wrap:wrap;
    box-shadow:var(--shadow);
  }
  .grid-demo{display:flex;gap:6px;}
  .grid-box{
    position:relative;width:2.5rem;height:2.5rem;border:1.5px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;font-size:1.4rem;font-weight:700;
    background:var(--paper);flex:none;
  }
  .grid-box.small{width:1.9rem;height:1.9rem;font-size:1.05rem;}
  .grid-box::before{content:'';position:absolute;top:50%;left:2px;right:2px;border-top:1px dashed rgba(33,29,24,.32);}
  .grid-box::after{content:'';position:absolute;left:50%;top:2px;bottom:2px;border-left:1px dashed rgba(33,29,24,.32);}
  .hero-panel .cap{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ink-soft);max-width:220px;}

  .levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin:36px 0;}
  .lvl-card{
    border:2px solid var(--ink);background:var(--paper);padding:20px;cursor:pointer;
    position:relative;overflow:hidden;transition:transform .15s ease;box-shadow:var(--shadow);
  }
  .lvl-card:hover{transform:translateY(-3px);}
  .lvl-card .num{
    font-family:'Noto Serif SC',serif;font-weight:900;font-size:2.6rem;color:var(--line);
    position:absolute;right:10px;top:2px;line-height:1;
  }
  .lvl-card h3{font-family:'Fraunces',serif;font-size:1.3rem;margin:0 0 4px;}
  .lvl-card .sub{font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--seal);margin-bottom:10px;display:block;}
  .lvl-card p{font-size:.9rem;color:var(--ink-soft);line-height:1.5;margin:0 0 14px;min-height:60px;}
  .lvl-card .go{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ink);border-top:1px solid var(--line);padding-top:10px;display:flex;justify-content:space-between;}
  .best{font-size:.72rem;color:var(--jade);}

  .section-title{font-family:'Fraunces',serif;font-size:1.5rem;margin:44px 0 6px;}
  .section-title small{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--ink-soft);display:block;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
  .howto{border-left:3px solid var(--brass);padding:6px 0 6px 18px;color:var(--ink-soft);font-size:.92rem;line-height:1.7;max-width:640px;}
  .backlink{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:none;border:none;color:var(--ink-soft);cursor:pointer;padding:0;margin-bottom:6px;text-decoration:underline;}

  /* LATIHAN GRID (per level) */
  .latihan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:26px 0;}
  .latihan-card{
    border:1.5px solid var(--ink);background:var(--paper);padding:16px 18px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .15s ease;position:relative;
  }
  .latihan-card:hover{transform:translateY(-2px);}
  .latihan-card .lnum{
    font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--seal);letter-spacing:.06em;
    text-transform:uppercase;margin-bottom:6px;display:block;
  }
  .latihan-card h4{font-family:'Fraunces',serif;font-size:1.05rem;margin:0 0 8px;}
  .latihan-card .meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:8px;}

  /* IDENTITY FORM */
  .identity-wrap{max-width:520px;margin:50px auto 0;}
  .identity-card{border:2px solid var(--ink);background:var(--paper-deep);padding:40px 36px;box-shadow:var(--shadow);}
  .identity-card .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--jade);display:block;margin-bottom:10px;}
  .identity-card h2{font-family:'Fraunces',serif;font-size:1.7rem;margin:0 0 6px;}
  .identity-card .sub{color:var(--ink-soft);font-size:.92rem;margin:0 0 26px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px;}
  .field input{
    width:100%;padding:12px 14px;border:1.5px solid var(--ink);background:#fff;
    font-family:'Inter',sans-serif;font-size:1rem;
  }
  .field input:focus{outline:2px solid var(--seal);outline-offset:1px;}
  .form-error{color:var(--seal);font-size:.82rem;font-family:'JetBrains Mono',monospace;margin:-8px 0 16px;}

  /* PRACTICE */
  .practice-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:34px 0 22px;}
  .badge{
    font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
    border:1.5px solid var(--ink);padding:4px 10px;background:var(--paper-deep);
  }
  .stat-row{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ink-soft);}
  .stat-row b{color:var(--ink);}
  .progress-bar{height:6px;background:var(--paper-deep);border:1px solid var(--ink);margin-bottom:30px;}
  .progress-bar > div{height:100%;background:var(--seal);transition:width .25s ease;}

  .card{
    border:2px solid var(--ink);background:var(--paper);box-shadow:var(--shadow);
    padding:34px 32px;position:relative;
  }
  .qnote{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--jade);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
  .qtext{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:1.6rem;line-height:1.45;margin:0 0 26px;max-width:640px;}
  .input-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
  textarea#answerInput{
    flex:1;min-width:240px;font-family:'Noto Serif SC',serif;font-size:1.5rem;
    padding:14px 16px;border:1.5px solid var(--ink);background:#fff;resize:none;height:64px;
  }
  textarea#answerInput:focus{outline:2px solid var(--seal);outline-offset:1px;}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:.92rem;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);
    padding:14px 22px;cursor:pointer;letter-spacing:.01em;
  }
  .btn:hover{background:var(--seal-deep);border-color:var(--seal-deep);}
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn.ghost:hover{background:var(--paper-deep);color:var(--ink);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn:focus-visible, button:focus-visible, textarea:focus-visible, input:focus-visible{outline:2px solid var(--seal);outline-offset:2px;}

  .actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}

  .feedback{margin-top:26px;padding-top:22px;border-top:1.5px dashed var(--line);}
  .feedback.correct .verdict{color:var(--jade);}
  .feedback.wrong .verdict{color:var(--seal);}
  .verdict{font-family:'Fraunces',serif;font-weight:700;font-size:1.2rem;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .stamp{
    display:inline-flex;align-items:center;justify-content:center;
    width:2.1rem;height:2.1rem;border:3px double var(--jade);color:var(--jade);
    border-radius:50%;font-family:'Noto Serif SC',serif;font-weight:900;font-size:1.1rem;
    transform:rotate(-8deg);
  }
  .feedback.wrong .stamp{border-color:var(--seal);color:var(--seal);}
  .answer-grids{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 10px;}
  .answer-alt{font-size:.85rem;color:var(--ink-soft);margin-top:6px;}
  .answer-alt b{color:var(--ink);font-family:'Noto Serif SC',serif;font-weight:600;}

  /* SUMMARY */
  .summary-card{border:2px solid var(--ink);background:var(--paper-deep);padding:50px 40px;text-align:center;box-shadow:var(--shadow);}
  .summary-card .big{font-family:'Fraunces',serif;font-size:3rem;margin:0;}
  .summary-card .lvl{font-family:'JetBrains Mono',monospace;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--seal);}
  .summary-card p{color:var(--ink-soft);}
  .summary-card .who{font-family:'Fraunces',serif;font-size:1.1rem;margin-top:-6px;}

  /* VOCAB */
  .vocab-toolbar{display:flex;gap:8px;margin:30px 0 20px;flex-wrap:wrap;}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:7px 14px;
    border:1.5px solid var(--ink);background:var(--paper);cursor:pointer;
  }
  .chip.active{background:var(--ink);color:var(--paper);}
  table.vocab{width:100%;border-collapse:collapse;font-size:.94rem;}
  table.vocab th{
    text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;
    letter-spacing:.06em;color:var(--ink-soft);border-bottom:2px solid var(--ink);padding:8px 10px;
  }
  table.vocab td{padding:10px 10px;border-bottom:1px solid var(--line-soft);}
  table.vocab td.hz{font-family:'Noto Serif SC',serif;font-size:1.3rem;font-weight:600;width:70px;}

  footer.site{margin-top:60px;padding-top:20px;border-top:2px solid var(--ink);font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--ink-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}

  @media (max-width:640px){
    .card{padding:24px 18px;}
    .qtext{font-size:1.3rem;}
    .hero-panel{flex-direction:column;align-items:flex-start;}
    .identity-card{padding:28px 22px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>
<header class="site">
  <div class="logo" onclick="goHome()">
    <span class="mark">字</span>
    <span class="name">Whyfy<em>打字</em></span>
  </div>
  <div class="header-right">
    <div id="studentPillHolder"></div>
    <nav class="top">
      <button id="navHome" class="active" onclick="goHome()">Beranda</button>
      <button id="navVocab" onclick="goVocab()">Kosakata</button>
    </nav>
  </div>
</header>

<div class="wrap" id="app"></div>

<script>
/* ============ DATA ============ */
const LEVELS = [
  {id:1, label:'HSK 1', sub:'Fondasi', desc:'是/有/吗, kata ganti, angka + kata bantu bilangan, kalimat inti yang sangat sederhana.'},
  {id:2, label:'HSK 2', sub:'Pemula Lanjut', desc:'了, 在 (sedang), 会/得, perbandingan 比, 因为...所以, 觉得.'},
  {id:3, label:'HSK 3', sub:'Menengah Awal', desc:'把-sentence, 被 (pasif), 虽然...但是, 一边...一边, 越来越, 除了...以外.'},
  {id:4, label:'HSK 4', sub:'Menengah', desc:'尽管...还是, 不但...而且, 只有...才, 无论...都, 由于, 与其...不如.'},
  {id:5, label:'HSK 5', sub:'Menengah Lanjut', desc:'即使...也, 万一, 除非...否则, 与其说...不如说, 甚至, 何况, 何必.'}
];

/* QUESTIONS[level] = array of 10 latihan; each latihan = {title, note, items:[{id_text, answers}]} */
const QUESTIONS = {
  1:[
    {title:'Latihan 1', note:'是 / 不是', items:[
      {id_text:'Saya adalah murid.', answers:['我是学生']},
      {id_text:'Dia adalah dokter.', answers:['他是医生','她是医生']},
      {id_text:'Kami bukan guru.', answers:['我们不是老师']},
      {id_text:'Dia bukan orang Amerika.', answers:['他不是美国人','她不是美国人']},
      {id_text:'Ini adalah rumahku.', answers:['这是我的家']}
    ]},
    {title:'Latihan 2', note:'有 / 没有', items:[
      {id_text:'Aku punya seekor anjing.', answers:['我有一只狗']},
      {id_text:'Dia tidak punya mobil.', answers:['他没有车','她没有车']},
      {id_text:'Kami punya banyak teman.', answers:['我们有很多朋友']},
      {id_text:'Aku tidak punya uang.', answers:['我没有钱']},
      {id_text:'Dia punya dua anak.', answers:['他有两个孩子','她有两个孩子']}
    ]},
    {title:'Latihan 3', note:'angka + kata bantu bilangan', items:[
      {id_text:'Aku punya empat kursi.', answers:['我有四把椅子']},
      {id_text:'Dia membeli lima apel.', answers:['他买了五个苹果','她买了五个苹果']},
      {id_text:'Kami punya tiga anjing.', answers:['我们有三只狗']},
      {id_text:'Aku ingin satu cangkir teh.', answers:['我要一杯茶']},
      {id_text:'Dia punya enam buku.', answers:['他有六本书','她有六本书']}
    ]},
    {title:'Latihan 4', note:'的 (kepemilikan/atribut)', items:[
      {id_text:'Ini bukan mobilku.', answers:['这不是我的车']},
      {id_text:'Itu adalah tas kakak perempuanku.', answers:['那是我姐姐的包']},
      {id_text:'Ini adalah rumah kami.', answers:['这是我们的家']},
      {id_text:'Itu adalah buku milik guru.', answers:['那是老师的书']},
      {id_text:'Ini adalah kucing milik temanku.', answers:['这是我朋友的猫']}
    ]},
    {title:'Latihan 5', note:'吗 (pertanyaan ya/tidak)', items:[
      {id_text:'Apakah kamu punya waktu?', answers:['你有时间吗']},
      {id_text:'Apakah dia guru?', answers:['他是老师吗','她是老师吗']},
      {id_text:'Apakah kamu suka kopi?', answers:['你喜欢咖啡吗']},
      {id_text:'Apakah ini rumahmu?', answers:['这是你的家吗']},
      {id_text:'Apakah mereka murid?', answers:['他们是学生吗']}
    ]},
    {title:'Latihan 6', note:'谁 / 什么 / 哪', items:[
      {id_text:'Ini apa?', answers:['这是什么']},
      {id_text:'Siapa dia?', answers:['他是谁','她是谁']},
      {id_text:'Kamu suka warna apa?', answers:['你喜欢什么颜色']},
      {id_text:'Kamu orang mana?', answers:['你是哪国人']},
      {id_text:'Buku siapa ini?', answers:['这是谁的书']}
    ]},
    {title:'Latihan 7', note:'喜欢 + kata kerja/benda', items:[
      {id_text:'Aku suka membaca buku.', answers:['我喜欢看书']},
      {id_text:'Dia suka makan buah.', answers:['他喜欢吃水果','她喜欢吃水果']},
      {id_text:'Kami suka bahasa Mandarin.', answers:['我们喜欢汉语','我们喜欢中文']},
      {id_text:'Aku tidak suka kopi.', answers:['我不喜欢咖啡']},
      {id_text:'Dia suka mendengarkan musik.', answers:['他喜欢听音乐','她喜欢听音乐']}
    ]},
    {title:'Latihan 8', note:'在 (lokasi)', items:[
      {id_text:'Aku ada di rumah.', answers:['我在家']},
      {id_text:'Dia ada di kantor.', answers:['他在办公室','她在办公室']},
      {id_text:'Buku itu ada di atas meja.', answers:['书在桌子上']},
      {id_text:'Kami ada di sekolah.', answers:['我们在学校']},
      {id_text:'Kucing itu ada di bawah kursi.', answers:['猫在椅子下面']}
    ]},
    {title:'Latihan 9', note:'想 + kata kerja', items:[
      {id_text:'Aku ingin pergi ke Beijing.', answers:['我想去北京']},
      {id_text:'Dia ingin belajar bahasa Mandarin.', answers:['他想学汉语','她想学汉语','他想学中文','她想学中文']},
      {id_text:'Kami ingin makan mi.', answers:['我们想吃面条']},
      {id_text:'Aku ingin minum air.', answers:['我想喝水']},
      {id_text:'Dia ingin menonton film.', answers:['他想看电影','她想看电影']}
    ]},
    {title:'Latihan 10', note:'几 / 多少', items:[
      {id_text:'Kamu punya berapa buku?', answers:['你有几本书']},
      {id_text:'Sekarang jam berapa?', answers:['现在几点']},
      {id_text:'Berapa harga ini?', answers:['这个多少钱']},
      {id_text:'Ada berapa orang?', answers:['有几个人']},
      {id_text:'Kamu punya berapa uang?', answers:['你有多少钱']}
    ]}
  ],
  2:[
    {title:'Latihan 1', note:'了 (aksi selesai)', items:[
      {id_text:'Aku sudah makan.', answers:['我吃了','我吃饭了']},
      {id_text:'Dia sudah pergi ke sekolah.', answers:['他去学校了','她去学校了']},
      {id_text:'Kami sudah membeli buku itu.', answers:['我们买那本书了','我们买了那本书']},
      {id_text:'Aku sudah selesai menulis surat.', answers:['我写完信了','我写完了信']},
      {id_text:'Dia sudah bangun.', answers:['他起床了','她起床了']}
    ]},
    {title:'Latihan 2', note:'在 + kata kerja (sedang)', items:[
      {id_text:'Aku sedang belajar bahasa Mandarin.', answers:['我在学汉语','我在学中文']},
      {id_text:'Dia sedang memasak.', answers:['他在做饭','她在做饭']},
      {id_text:'Kami sedang menunggu bis.', answers:['我们在等公共汽车']},
      {id_text:'Aku sedang menulis surat.', answers:['我在写信']},
      {id_text:'Dia sedang mendengarkan musik.', answers:['他在听音乐','她在听音乐']}
    ]},
    {title:'Latihan 3', note:'会 / 能 / 可以', items:[

/* ============ STATE ============ */
let state = {
  view:'home',       // home | level | identity | practice | summary | vocab
  level:null,
  latihanIdx:null,   // index of chosen latihan within the level
  pendingStart:null, // {level, latihanIdx} waiting for identity before practice starts
  order:[],
  idx:0,
  score:0,
  streak:0,
  answered:false,
  lastCorrect:false,
  vocabLevel:1,
  student:{nama:'', kelas:''}
};

try{
  const savedName = localStorage.getItem('whyfy_student_nama');
  const savedKelas = localStorage.getItem('whyfy_student_kelas');
  if(savedName) state.student.nama = savedName;
  if(savedKelas) state.student.kelas = savedKelas;
}catch(e){}

/* ============ HELPERS ============ */
function normalize(s){
  return (s||'').replace(/[\s,，。.、!！?？'"“”‘’;；:：]/g,'').trim();
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function bestKey(lvl, latihanIdx){return 'whyfy_best_l'+lvl+'_e'+latihanIdx;}
function getBest(lvl, latihanIdx){return parseInt(localStorage.getItem(bestKey(lvl,latihanIdx))||'0',10);}
function setBest(lvl, latihanIdx, score){
  if(score> getBest(lvl,latihanIdx)) localStorage.setItem(bestKey(lvl,latihanIdx), String(score));
}
function hasIdentity(){
  return state.student.nama.trim().length>0 && state.student.kelas.trim().length>0;
}

/* ============ NAV ============ */
function goHome(){
  state.view='home';
  document.getElementById('navHome').classList.add('active');
  document.getElementById('navVocab').classList.remove('active');
  render();
}
function goVocab(){
  state.view='vocab';
  document.getElementById('navVocab').classList.add('active');
  document.getElementById('navHome').classList.remove('active');
  render();
}
function openLevel(lvl){
  state.level=lvl;
  state.view='level';
  render();
}
function requestStart(lvl, latihanIdx){
  if(hasIdentity()){
    beginPractice(lvl, latihanIdx);
  } else {
    state.pendingStart={level:lvl, latihanIdx:latihanIdx};
    state.view='identity';
    render();
  }
}
function submitIdentity(){
  const nama = document.getElementById('inputNama').value.trim();
  const kelas = document.getElementById('inputKelas').value.trim();
  const errEl = document.getElementById('identityError');
  if(!nama || !kelas){
    errEl.textContent = 'Nama dan asal kelas wajib diisi sebelum memulai latihan.';
    return;
  }
  state.student.nama = nama;
  state.student.kelas = kelas;
  try{
    localStorage.setItem('whyfy_student_nama', nama);
    localStorage.setItem('whyfy_student_kelas', kelas);
  }catch(e){}
  if(state.pendingStart){
    beginPractice(state.pendingStart.level, state.pendingStart.latihanIdx);
    state.pendingStart=null;
  } else {
    goHome();
  }
}
function changeIdentity(){
  state.pendingStart=null;
  state.view='identity';
  render();
}
function beginPractice(lvl, latihanIdx){
  state.view='practice';
  state.level=lvl;
  state.latihanIdx=latihanIdx;
  const items = QUESTIONS[lvl][latihanIdx].items;
  state.order=shuffle(items.map((_,i)=>i));
  state.idx=0;
  state.score=0;
  state.streak=0;
  state.answered=false;
  render();
}
function pickVocabLevel(lvl){ state.vocabLevel=lvl; render(); }

/* ============ ANSWER LOGIC ============ */
function checkAnswer(){
  const ta = document.getElementById('answerInput');
  if(!ta) return;
  const items = QUESTIONS[state.level][state.latihanIdx].items;
  const q = items[state.order[state.idx]];
  const userNorm = normalize(ta.value);
  const isCorrect = q.answers.some(a=>normalize(a)===userNorm) && userNorm.length>0;
  state.answered=true;
  state.lastCorrect=isCorrect;
  if(isCorrect){ state.score++; state.streak++; }
  else{ state.streak=0; }
  render();
}
function revealAnswer(){
  state.answered=true;
  state.lastCorrect=false;
  state.streak=0;
  render();
}
function nextQuestion(){
  state.answered=false;
  if(state.idx < state.order.length-1){
    state.idx++;
    render();
  } else {
    setBest(state.level, state.latihanIdx, state.score);
    state.view='summary';
    render();
  }
}
function retryLatihan(){ beginPractice(state.level, state.latihanIdx); }

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(state.view==='home') app.innerHTML = renderHome();
  else if(state.view==='level') app.innerHTML = renderLevel();
  else if(state.view==='identity') app.innerHTML = renderIdentity();
  else if(state.view==='practice') app.innerHTML = renderPractice();
  else if(state.view==='summary') app.innerHTML = renderSummary();
  else if(state.view==='vocab') app.innerHTML = renderVocab();

  renderStudentPill();

  if(state.view==='practice'){
    const ta = document.getElementById('answerInput');
    if(ta){
      ta.focus();
      ta.addEventListener('keydown', e=>{
        if(e.key==='Enter' && !e.shiftKey){
          e.preventDefault();
          if(!state.answered) checkAnswer(); else nextQuestion();
        }
      });
    }
  }
  if(state.view==='identity'){
    const nm = document.getElementById('inputNama');
    if(nm) nm.focus();
  }
}

function renderStudentPill(){
  const holder = document.getElementById('studentPillHolder');
  if(!holder) return;
  if(hasIdentity()){
    holder.innerHTML = `<div class="student-pill">${state.student.nama} · ${state.student.kelas} <button onclick="changeIdentity()">ganti</button></div>`;
  } else {
    holder.innerHTML = '';
  }
}

    feedbackHtml = `
      <div class="feedback ${state.lastCorrect?'correct':'wrong'}">
        <div class="verdict"><span class="stamp">${state.lastCorrect?'对':'X'}</span>${state.lastCorrect?'Benar!':'Belum tepat'}</div>
        <div class="answer-grids">${gridHtml}</div>

      </div>`;
  }

  return `
  <div class="practice-head">
    <div>
      <span class="badge">${lvl.label} · ${lat.title}: ${lat.note}</span>
    </div>
    <div class="stat-row">
      <span>Soal <b>${state.idx+1}/${total}</b></span>
      <span>Skor <b>${state.score}</b></span>
      <span>Beruntun <b>${state.streak}</b></span>
    </div>
  </div>
  <div class="progress-bar"><div style="width:${pct}%"></div></div>

  <div class="card">
    <div class="qnote">${lat.note}</div>
    <p class="qtext">&ldquo;${q.id_text}&rdquo;</p>
    <div class="input-row">
      <textarea id="answerInput" placeholder="输入汉字…" ${state.answered?'disabled':''}></textarea>
    </div>
    <div class="actions">
      ${state.answered
        ? `<button class="btn" onclick="nextQuestion()">${state.idx<total-1?'Soal Berikutnya →':'Lihat Hasil →'}</button>`
        : `<button class="btn" onclick="checkAnswer()">Periksa Jawaban</button>
           <button class="btn ghost" onclick="revealAnswer()">Lihat Kunci</button>`
      }
      <button class="btn ghost" onclick="openLevel(state.level)">Kembali ke Daftar Latihan</button>
    </div>
    ${feedbackHtml}
  </div>
  `;
}

function renderSummary(){
  const lvl = LEVELS.find(l=>l.id===state.level);
  const lat = QUESTIONS[state.level][state.latihanIdx];
  const total = state.order.length;
  const best = getBest(state.level, state.latihanIdx);
  return `
  <div style="margin-top:40px;">
  <div class="summary-card">
    <div class="lvl">${lvl.label} · ${lat.title}: ${lat.note}</div>
    <p class="big">${state.score} / ${total}</p>
    <p class="who">${state.student.nama} — ${state.student.kelas}</p>
    <p>Skor terbaikmu untuk latihan ini: <b>${best}</b> / ${total}</p>
    <div class="actions" style="justify-content:center;">
      <button class="btn" onclick="retryLatihan()">Coba Lagi</button>
      <button class="btn ghost" onclick="openLevel(state.level)">Latihan Lain di ${lvl.label}</button>
      <button class="btn ghost" onclick="goHome()">Pilih Level Lain</button>
    </div>
  </div>
  </div>
  `;
}

function renderVocab(){
  const words = VOCAB[state.vocabLevel];
  return `
  <h2 class="section-title"><small>Referensi</small>Kosakata per level HSK</h2>
  <div class="vocab-toolbar">
    ${LEVELS.map(l=>`<button class="chip ${state.vocabLevel===l.id?'active':''}" onclick="pickVocabLevel(${l.id})">${l.label}</button>`).join('')}
  </div>
  <table class="vocab">
    <thead><tr><th>Hanzi</th><th>Arti (Indonesia)</th></tr></thead>
    <tbody>
      ${words.map(w=>`<tr><td class="hz">${w[0]}</td><td>${w[1]}</td></tr>`).join('')}
    </tbody>
  </table>
  `;
}

render();
</script>

<div class="wrap">
<footer class="site">
  <span>Whyfy打字 — latihan mengetik hanzi untuk pelajar HSK 1–5</span>
  <span>Dibuat untuk berlatih menulis aksara, bukan pinyin.</span>
</footer>
</div>
</body>
